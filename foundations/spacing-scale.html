<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="8-point grid · --space-1 → --space-16" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--colour-primaryblue-400); border-radius: var(--radius-xs); width: 100%; }
  .name { font: var(--helper-size)/1.3 var(--font-mono); color: var(--text-caption); }
  .px { font: 700 var(--helper-size)/1.3 var(--font-normal); color: var(--text-title); }
</style>
</head>
<body>
<div class="row" id="s"></div>
<script>
  const steps = [["1",4],["2",8],["3",12],["4",16],["5",20],["6",24],["8",32],["10",40],["12",48],["16",64]];
  document.getElementById("s").innerHTML = steps.map(([k,v]) =>
    `<div class="item" style="width:${v+8}px"><div class="bar" style="height:${v}px"></div><div class="px">${v}</div><div class="name">space-${k}</div></div>`
  ).join("");
</script>
</body>
</html>
