<!-- @dsCard group="Spacing" viewport="700x150" name="Radius" subtitle="--radius-xs → pill · restrained, enterprise-crisp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 64px; background: var(--colour-primaryblue-50); border: 1.5px solid var(--colour-primaryblue-400); }
  .name { font: var(--helper-size)/1.3 var(--font-mono); color: var(--text-caption); }
</style>
</head>
<body>
<div class="row" id="s"></div>
<script>
  const steps = [["xs","2px"],["sm","4px"],["md","6px"],["lg","8px"],["xl","12px"],["pill","999px"]];
  document.getElementById("s").innerHTML = steps.map(([k,v]) =>
    `<div class="item"><div class="box" style="border-radius:var(--radius-${k})"></div><div class="name">${k} · ${v}</div></div>`
  ).join("");
</script>
</body>
</html>
