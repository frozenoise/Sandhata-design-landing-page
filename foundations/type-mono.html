<!-- @dsCard group="Type" viewport="700x150" name="Mono & families" subtitle="Akkurat-Mono + the four type families" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); display: flex; flex-direction: column; gap: 14px; }
  .fam { display: flex; align-items: baseline; gap: 16px; }
  .meta { font: var(--helper-size)/1.4 var(--font-mono); color: var(--text-caption); width: 120px; flex-shrink: 0; }
  .big { font-size: 22px; color: var(--text-title); }
  .mono { font-family: var(--font-mono); font-size: 14px; color: var(--text-body); background: var(--surface-secondary); padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-subtle); }
</style>
</head>
<body>
  <div class="fam"><span class="meta">Light · 300</span><span class="big" style="font-family:var(--font-light);font-weight:300">Sandhata Akkurat</span></div>
  <div class="fam"><span class="meta">Regular · 400</span><span class="big" style="font-family:var(--font-normal)">Sandhata Akkurat</span></div>
  <div class="fam"><span class="meta">Bold · 700</span><span class="big" style="font-family:var(--font-bold);font-weight:700">Sandhata Akkurat</span></div>
  <div class="mono">const npm = "install SandhataUI"; // Akkurat-Mono · 0123456789</div>
</body>
</html>
