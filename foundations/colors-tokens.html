<!-- @dsCard group="Colors" viewport="700x170" name="Semantic tokens" subtitle="Surface / text / border aliases used in product UI" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-secondary); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .tok { display: flex; align-items: center; gap: 8px; padding: 8px; background: var(--surface-raised); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); }
  .chip { width: 28px; height: 28px; border-radius: var(--radius-xs); border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }
  .name { font: var(--helper-size)/1.3 var(--font-mono); color: var(--text-body); }
</style>
</head>
<body>
<div class="grid" id="s"></div>
<script>
  const toks = [
    "--surface-page","--surface-secondary","--surface-inverse","--surface-disabled",
    "--background-action","--background-highlight","--background-selected","--surface-success",
    "--text-title","--text-body","--text-caption","--text-link",
    "--border-subtle","--border-default","--border-strong","--border-action",
  ];
  document.getElementById("s").innerHTML = toks.map(t =>
    `<div class="tok"><div class="chip" style="background:var(${t})"></div><div class="name">${t.replace('--','')}</div></div>`
  ).join("");
</script>
</body>
</html>
