<!-- @dsCard group="Brand" viewport="700x180" name="Gradient & accents" subtitle="Signature magenta→blue gradient + brand mark colours" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); display: flex; flex-direction: column; gap: 14px; }
  .grad { height: 84px; border-radius: var(--radius-lg); background: var(--gradient-brand); display: flex; align-items: flex-end; padding: 12px; }
  .grad span { font: var(--helper-size)/1.3 var(--font-mono); color: rgba(255,255,255,0.85); }
  .chips { display: flex; gap: 10px; }
  .chip { flex: 1; height: 44px; border-radius: var(--radius-sm); display: flex; align-items: center; padding: 0 12px; font: 700 var(--body-small-size)/1 var(--font-normal); color: #fff; }
</style>
</head>
<body>
  <div class="grad"><span>--gradient-brand · magenta (223 0 193) → deep blue (0 34 137)</span></div>
  <div class="chips">
    <div class="chip" style="background:var(--brand-cyan)">Cyan · 0 164 220</div>
    <div class="chip" style="background:var(--brand-orange)">Orange · 246 129 54</div>
    <div class="chip" style="background:var(--brand-ink)">Ink · 72 72 79</div>
  </div>
</body>
</html>
