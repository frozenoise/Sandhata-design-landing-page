<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Soft neutral shadows + brand focus glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--surface-secondary); }
  .row { display: flex; gap: 22px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 92px; height: 56px; background: var(--surface-raised); border-radius: var(--radius-md); border: 1px solid var(--border-subtle); }
  .name { font: var(--helper-size)/1.3 var(--font-mono); color: var(--text-caption); }
</style>
</head>
<body>
<div class="row" id="s"></div>
<script>
  const steps = [["xs","shadow-xs"],["sm","shadow-sm"],["md","shadow-md"],["lg","shadow-lg"],["focus","shadow-focus"]];
  document.getElementById("s").innerHTML = steps.map(([k,t]) =>
    `<div class="item"><div class="box" style="box-shadow:var(--${t})"></div><div class="name">${t}</div></div>`
  ).join("");
</script>
</body>
</html>
