<!-- @dsCard group="Components" viewport="700x320" name="Cards, badges & data" subtitle="Card, StatCard, Badge, Tag, Avatar" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 16px; }
  .top { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 16px; margin-bottom: 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="../cardshell.js"></script>
<script type="text/babel">
  const { Card, StatCard, Badge, Tag, Avatar } = window.SandhataDesignSystem_081a0e;
  const { CardShell } = window;

  const code = `<span class="t">&lt;Card</span> <span class="p">title</span>=<span class="s">"Line Chart"</span> <span class="p">subtitle</span>=<span class="s">"Last 3 months"</span><span class="t">&gt;</span>…<span class="t">&lt;/Card&gt;</span>
<span class="t">&lt;StatCard</span> <span class="p">label</span>=<span class="s">"Desktop"</span> <span class="p">value</span>=<span class="s">"24,828"</span> <span class="p">trend</span>=<span class="s">"5.2% this month"</span> /<span class="t">&gt;</span>

<span class="t">&lt;Badge</span> <span class="p">tone</span>=<span class="s">"success"</span> <span class="p">dot</span><span class="t">&gt;</span>Active<span class="t">&lt;/Badge&gt;</span>
<span class="t">&lt;Badge</span> <span class="p">tone</span>=<span class="s">"action"</span> <span class="p">variant</span>=<span class="s">"solid"</span><span class="t">&gt;</span>New<span class="t">&lt;/Badge&gt;</span>
<span class="t">&lt;Tag</span> <span class="p">onRemove</span>={fn}<span class="t">&gt;</span>Democratic-Republican<span class="t">&lt;/Tag&gt;</span>
<span class="t">&lt;Avatar</span> <span class="p">name</span>=<span class="s">"John Adams"</span> /<span class="t">&gt;</span>`;

  function Demo() {
    return (
      <CardShell code={code}>
        <div className="top">
          <Card title="Line Chart" subtitle="Last 3 months">
            <div style={{ display: "flex", gap: 12 }}>
              <Avatar name="John Adams" />
              <Avatar name="Thomas Jefferson" tone="purple" />
              <Avatar name="James Madison" tone="neutral" />
            </div>
          </Card>
          <StatCard label="Desktop" value="24,828" trend="5.2% this month" />
          <StatCard label="Mobile" value="25,010" trend="1.1% this month" trendDirection="down" />
        </div>
        <div className="row">
          <Badge tone="success" dot>Active</Badge>
          <Badge tone="warning">Pending</Badge>
          <Badge tone="error" dot>Failed</Badge>
          <Badge tone="info">Info</Badge>
          <Badge tone="action" variant="solid">New</Badge>
          <Badge tone="highlight">Beta</Badge>
        </div>
        <div className="row">
          <Tag>Federalist</Tag>
          <Tag tone="action" onRemove={()=>{}}>Democratic-Republican</Tag>
          <Tag onRemove={()=>{}}>Whig</Tag>
        </div>
      </CardShell>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
