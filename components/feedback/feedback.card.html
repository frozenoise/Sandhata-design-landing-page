<script src="../../_ds_bundle.js"></script>

<script type="text/babel">
  const { Alert, Tooltip, Spinner, Button } = window.SandhataDesignSystem_081a0e;
  const { CardShell } = window;

  const code = `<span class="t">&lt;Alert</span> <span class="p">tone</span>=<span class="s">"success"</span> <span class="p">title</span>=<span class="s">"Saved"</span><span class="t">&gt;</span>
  Your changes were saved successfully.<span class="t">&lt;/Alert&gt;</span>
<span class="t">&lt;Alert</span> <span class="p">tone</span>=<span class="s">"warning"</span> <span class="p">title</span>=<span class="s">"Heads up"</span> <span class="p">onClose</span>={fn}<span class="t">&gt;</span>

<span class="t">&lt;Tooltip</span> <span class="p">label</span>=<span class="s">"This is a tooltip"</span><span class="t">&gt;</span>
  <span class="t">&lt;Button</span> <span class="p">hierarchy</span>=<span class="s">"tertiary"</span><span class="t">&gt;</span>Hover me<span class="t">&lt;/Button&gt;&lt;/Tooltip&gt;</span>
<span class="t">&lt;Spinner</span> <span class="p">size</span>={20} /<span class="t">&gt;</span>`;

  function Demo() {
    return (
      <CardShell code={code}>
        <div className="stack">
          <Alert tone="success" title="Saved">Your changes were saved successfully.</Alert>
          <Alert tone="warning" title="Heads up" onClose={()=>{}}>Your trial ends in 3 days.</Alert>
          <Alert tone="error">Something went wrong. Try again.</Alert>
        </div>
        <div className="row">
          <Tooltip label="This is a tooltip"><Button hierarchy="tertiary" size="small">Hover me</Button></Tooltip>
          <Spinner size={20} />
          <Spinner size={28} />

    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
