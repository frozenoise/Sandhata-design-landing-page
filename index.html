<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sandhata Design System</title>
<link rel="stylesheet" href="styles.css" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #FEFAF7; overflow-x: hidden; font-family: var(--font-normal); color: #0a0a14; }

/* ─── Tokens local ────────────────────────────────────────────── */
:root { --blue: #0036DD; --blue-50: #EEF3FF; --page: #FEFAF7; }

/* ─── Nav ────────────────────────────────────────────────────── */
.nav {
  position: sticky; top: 0; z-index: 200;
  height: 100px; padding: 20px 40px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px) saturate(1.2);
  border-bottom: 1px solid #e6e7eb;
}
.nav-logo { display: flex; align-items: center; }
.nav-logo img { height: 37px; }
.nav-links { display: flex; align-items: center; gap: 37px; }
.nl {
  display: inline-flex; align-items: center; height: 48px; padding: 12px;
  border-radius: 4px; font: 400 16px/24px var(--font-normal);
  color: #000; text-decoration: none; border: none; background: none; cursor: pointer;
  transition: background .12s, color .12s;
}
.nl:hover { background: rgba(10,10,20,0.05); }

/* ─── Hero ───────────────────────────────────────────────────── */
/* Aurora fills the hero; a cream "cut" layer (with the gradient rule line
   on its top edge) sits behind the window from the window's halfmark down,
   so the window straddles the cut — matches Figma 5252:46348. */
.hero {
  position: relative; isolation: isolate;
  padding: 101px 40px 0; text-align: center;
  background: #fdf5f0; /* cream base behind the animated aurora */
}
/* animated aurora layer — breathes between a narrow and a wide gradient
   (Figma component 5252:45431, Frame 400 ⇄ Frame 458) */
.hero-aurora {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(135% 82% at 50% 118%,
      #ff9b00 0%,
      #ffab29 12%,
      #ffbb52 19%,
      #fecb7c 26%,
      #fedba5 36%,
      rgba(243,174,202,0.5) 47%,
      rgba(231,128,240,0.26) 57%,
      rgba(183,212,248,0.16) 73%,
      #fdf5f0 87%
    );
  transform-origin: 50% 100%;
  animation: auroraBreathe 11s ease-in-out infinite alternate;
}
@keyframes auroraBreathe {
  0%   { transform: scale(1, 1); }
  100% { transform: scale(1.9, 1.42); }
}
/* faint concentric-arc texture from the bottom corners */
.hero::before {
  content: '';
  position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background-image:
    repeating-radial-gradient(circle at 2% 100%, transparent 0 37px, rgba(120,95,70,0.05) 37px 38px),
    repeating-radial-gradient(circle at 98% 100%, transparent 0 37px, rgba(120,95,70,0.05) 37px 38px);
  mask-image: radial-gradient(70% 70% at 50% 90%, transparent 32%, #000 72%);
  -webkit-mask-image: radial-gradient(70% 70% at 50% 90%, transparent 32%, #000 72%);
}
@media (prefers-reduced-motion: reduce) {
  .hero-aurora { animation: none; }
}

.hero h1 {
  font: 700 80px/1.2 var(--font-bold);
  color: #000; margin: 0 auto;
  max-width: 760px; letter-spacing: -2px;
  position: relative; z-index: 2;
}
.hero h1 em {
  font-style: normal; color: #d58b03;
  white-space: nowrap;
}
.hero-sparkle {
  display: inline-block; vertical-align: 0.5em;
  margin-left: 1px; color: #F2C44A;
}

.hero-sub {
  font: 18px/1.4 var(--font-normal); color: #6b7280;
  max-width: 570px; margin: 24px auto 0; position: relative; z-index: 2;
}
.hero-actions {
  display: flex; gap: 40px; justify-content: center;
  flex-wrap: wrap; position: relative; z-index: 2; margin-top: 24px;
}
.btn-primary {
  height: 48px; padding: 0 32px; border-radius: 4px;
  border: none; background: var(--blue); color: #fff;
  font: 700 16px/24px var(--font-bold); letter-spacing: 0.5px; cursor: pointer;
  transition: background .12s;
}
.btn-primary:hover { background: #0029b0; }

/* ─── Browser window ─────────────────────────────────────────── */
/* Sits inside the hero. A full-bleed cream "cut" layer is anchored to the
   window's vertical midpoint and carries the orange→purple rule line on its
   top edge, so the window straddles the cut and the line shows at the sides. */
.browser-outer {
  position: relative; z-index: 2;
  max-width: 1232px; margin: 56px auto 0;
  padding: 0 40px;
}
.browser-cut {
  content: ''; position: absolute; z-index: 0;
  top: 50%; height: 320px;
  left: -50vw; right: -50vw;
  background: var(--page);
  border-top: 2px solid transparent;
  border-image: linear-gradient(90deg, #f68136 0%, #f199cf 52%, #c77bf0 100%) 1;
}
.browser {
  position: relative; z-index: 1;
  border: 10px solid #fff; border-radius: 26px; overflow: hidden;
  background: #fff;
  box-shadow: 0 0 0 1px rgba(10,10,20,0.04),
              5px 5px 26px rgba(0,0,0,0.08);
}
.browser-bar {
  height: 40px; background: #ffffff;
  display: flex; align-items: center; padding: 0 16px; gap: 8px;
}
.bdot { width: 12px; height: 12px; border-radius: 50%; }
.browser-video {
  display: block; width: 100%; height: 560px;
  object-fit: cover; object-position: top center; background: #f2f2f2;
  border-radius: 0 0 16px 16px;
}

/* ─── Stats strip ────────────────────────────────────────────── */
.stats {
  position: relative; z-index: 2;
  padding: 132px 40px 96px;
  background: var(--page);
}
.stats-band { max-width: 1200px; margin: 0 auto; }
/* gradient rule lines above and below the stats */
.stats-line {
  height: 1px; border: none;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(246,129,54,0.7) 16%,
    rgba(241,153,207,0.7) 50%,
    rgba(199,123,240,0.7) 84%,
    transparent 100%);
}
.stats-inner {
  max-width: 720px; margin: 0 auto;
  padding: 40px 0;
  display: grid; grid-template-columns: repeat(3, 1fr);
}
.stat-cell { text-align: center; padding: 0 24px; }
.stat-cell + .stat-cell { border-left: 1px solid rgba(10,10,20,0.09); }
.stat-val {
  display: block;
  font: 900 52px/1 var(--font-bold); color: #0a0a14;
  letter-spacing: -2px; margin-bottom: 8px;
}
.stat-val em { font-style: normal; color: var(--blue); }
.stat-lbl { font: 13px/1 var(--font-normal); color: #7a7f8a; }

/* ─── Section divider ────────────────────────────────────────── */
.section-sep {
  width: 100%; height: 1px;
  background: linear-gradient(to right, transparent 0%, rgba(10,10,20,0.08) 20%, rgba(10,10,20,0.08) 80%, transparent 100%);
  max-width: 1200px; margin: 0 auto;
}

/* ─── What you can expect ────────────────────────────────────── */
.expect { padding: 80px 40px; background: var(--page); }
.expect-card {
  max-width: 1120px; margin: 0 auto;
  background: #fff;
  border: 1px solid rgba(10,10,20,0.08);
  border-radius: 20px;
  box-shadow: 0 4px 24px rgba(10,10,20,0.06), 0 1px 2px rgba(10,10,20,0.04);
  padding: 52px 56px 48px;
  position: relative; overflow: hidden;
}
/* subtle corner brackets on the card */
.expect-card::before,
.expect-card::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  border-color: rgba(0,54,221,0.2); border-style: solid;
}
.expect-card::before { top: 14px; left: 14px; border-width: 1.5px 0 0 1.5px; border-radius: 2px 0 0 0; }
.expect-card::after  { bottom: 14px; right: 14px; border-width: 0 1.5px 1.5px 0; border-radius: 0 0 2px 0; }

.expect-h {
  font: 900 46px/1.1 var(--font-bold); color: #0a0a14;
  letter-spacing: -1.5px; margin-bottom: 40px; max-width: 360px;
}
.expect-body {
  display: grid; grid-template-columns: 42% 1fr; gap: 48px; align-items: start;
}
.acc-item { border-bottom: 1px solid rgba(10,10,20,0.08); }
.acc-btn {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  padding: 18px 0; cursor: pointer; border: none; background: none; text-align: left;
  font: 700 15px/1.3 var(--font-bold); color: #0a0a14; gap: 10px;
  transition: color .12s;
}
.acc-btn:hover { color: var(--blue); }
.acc-btn .chev { flex-shrink: 0; color: rgba(10,10,20,0.28); transition: transform .2s, color .12s; }
.acc-btn.open .chev { transform: rotate(180deg); color: var(--blue); }
.acc-btn.open { color: var(--blue); }
.acc-body {
  font: 14px/1.7 var(--font-normal); color: #5c616e;
  padding-bottom: 18px;
}
.expect-panel {
  background: #FEFAF7;
  border: 1px solid rgba(10,10,20,0.07);
  border-radius: 14px;
  overflow: hidden;
  position: sticky; top: 72px;
  min-height: 420px;
}
.expect-footer {
  display: flex; justify-content: center; padding-top: 36px;
}
.btn-outline-blue {
  height: 38px; padding: 0 20px; border-radius: 7px;
  border: 1.5px solid var(--blue); background: transparent;
  color: var(--blue); font: 700 13px/1 var(--font-bold); cursor: pointer;
  transition: background .12s;
}
.btn-outline-blue:hover { background: var(--blue-50); }

/* ─── Annotated form panel ────────────────────────────────────── */
.fp { padding: 22px 22px 18px; }
.fp-lbl {
  display: inline-flex; padding: 2px 7px; border-radius: 4px;
  background: #FF3D9A; color: #fff;
  font: 700 9px/1.5 var(--font-bold); letter-spacing: 0.2px;
}
.fp-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.fp-field { margin-bottom: 11px; }
.fp-field-label { font: 11px/1 var(--font-normal); color: #8a8f9b; margin-bottom: 4px; }
.fp-input { width: 100%; height: 30px; border: 1px solid #e2e4e9; border-radius: 5px; background: #fff; padding: 0 9px; font: 12px/30px var(--font-normal); color: #374151; display: flex; align-items: center; }
.fp-textarea { width: 100%; height: 48px; border: 1px solid #e2e4e9; border-radius: 5px; background: #fff; padding: 7px 9px; font: 12px/1.5 var(--font-normal); color: #374151; }
.fp-radios { display: flex; flex-direction: column; gap: 5px; }
.fp-radio { display: flex; align-items: center; gap: 6px; font: 12px/1 var(--font-normal); color: #374151; }
.fp-dot { width: 13px; height: 13px; border-radius: 50%; border: 1.5px solid #d1d5db; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.fp-dot.on { border-color: var(--blue); }
.fp-dot.on::after { content:''; width:6px; height:6px; border-radius:50%; background:var(--blue); }
.fp-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.fp-cancel { height: 28px; padding: 0 12px; border-radius: 5px; border: 1px solid #e2e4e9; background: #fff; font: 700 11px/1 var(--font-bold); color: #374151; cursor: pointer; }
.fp-approve { height: 28px; padding: 0 12px; border-radius: 5px; border: none; background: var(--blue); font: 700 11px/1 var(--font-bold); color: #fff; cursor: pointer; }

/* ─── Token panel ────────────────────────────────────────────── */
.tp { padding: 22px; }
.tp-title { font: 700 13px/1 var(--font-bold); color: #0a0a14; margin-bottom: 14px; }
.tp-swatches { display: flex; gap: 3px; margin-bottom: 6px; }
.tp-swatch { flex: 1; height: 28px; border-radius: 4px; }
.tp-name { font: 11px/1 var(--font-normal); color: #8a8f9b; margin-bottom: 12px; }
.tp-code { background: #111827; border-radius: 7px; padding: 12px 14px; font: 11px/1.9 var(--font-mono); }
.tp-k { color: #93c5fd; } .tp-v { color: #86efac; }

/* ─── WCAG panel ─────────────────────────────────────────────── */
.wp { padding: 22px; }
.wp-title { font: 700 13px/1 var(--font-bold); color: #0a0a14; margin-bottom: 14px; }
.wc { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border: 1px solid #eaebee; border-radius: 7px; margin-bottom: 8px; }
.wc-icon { width: 28px; height: 28px; border-radius: 6px; background: #dcfce7; display: flex; align-items: center; justify-content: center; font: 700 12px/1 sans-serif; color: #15803d; flex-shrink: 0; }
.wc-lbl { font: 700 12px/1 var(--font-bold); color: #0a0a14; margin-bottom: 3px; }
.wc-sub { font: 11px/1.4 var(--font-normal); color: #8a8f9b; }
.wc-ratio { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--blue-50); border-radius: 7px; margin-top: 10px; }
.wc-num { font: 900 22px/1 var(--font-bold); color: var(--blue); }
.wc-numl { font: 11px/1.4 var(--font-normal); color: #3b5ecc; }

/* ─── Dark mode panel ────────────────────────────────────────── */
.dmp { display: flex; flex-direction: column; }
.dmp-h { flex: 1; padding: 18px 20px; }
.dmp-h.dk { background: #0d1117; }
.dmp-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.dmp-lbl { font: 700 10px/1 var(--font-bold); letter-spacing: 0.5px; }
.dmp-lbl.lt { color: #374151; } .dmp-lbl.dk { color: rgba(255,255,255,0.4); }
.dmp-card { border-radius: 6px; padding: 12px; }
.dmp-card.lt { background: #fff; border: 1px solid #e5e7eb; }
.dmp-card.dk { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); }
.dmp-line { height: 8px; border-radius: 3px; margin-bottom: 5px; }
.dmp-line.lt { background: rgba(10,10,20,0.1); }
.dmp-line.dk { background: rgba(255,255,255,0.08); }
.dmp-btn { height: 22px; border-radius: 4px; border: none; margin-top: 8px; padding: 0 10px; font: 700 10px/1 sans-serif; cursor: pointer; }
.dmp-btn.lt { background: var(--blue); color: #fff; }
.dmp-btn.dk { background: rgba(0,54,221,0.7); color: #fff; }
.dmp-div { height: 1px; background: rgba(10,10,20,0.06); }

/* ─── Framework panel ────────────────────────────────────────── */
.fwp { padding: 20px 22px; }
.fwp-tabs { display: flex; gap: 4px; margin-bottom: 14px; }
.fwp-tab { padding: 4px 10px; border-radius: 5px; font: 700 11px/1 var(--font-bold); border: 1px solid transparent; cursor: pointer; }
.fwp-tab.on { background: var(--blue-50); color: var(--blue); border-color: rgba(0,54,221,0.2); }
.fwp-tab:not(.on) { color: #8a8f9b; }
.fwp-code { background: #0d1117; border-radius: 8px; padding: 14px 16px; font: 11.5px/1.85 var(--font-mono); }
.fk { color: #93c5fd; } .fs { color: #86efac; } .ft { color: #c4b5fd; } .fc { color: #4b5563; } .ff { color: #fde68a; }

/* ─── Figma sync panel ────────────────────────────────────────── */
.figp { padding: 22px; }
.figp-title { font: 700 13px/1 var(--font-bold); color: #0a0a14; margin-bottom: 14px; }
.figp-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid #eaebee; border-radius: 7px; margin-bottom: 8px; }
.figp-ico { width: 30px; height: 30px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.figp-ico.fig { background: #f0eeff; }
.figp-ico.code { background: var(--blue-50); }
.figp-lbl { font: 700 12px/1 var(--font-bold); color: #0a0a14; margin-bottom: 3px; }
.figp-sub { font: 11px/1 var(--font-mono); color: #8a8f9b; }
.figp-arrow { text-align: center; color: rgba(0,54,221,0.4); padding: 4px 0; font-size: 14px; }
.figp-ok { display: flex; align-items: center; gap: 6px; padding: 7px 10px; background: #dcfce7; border-radius: 6px; margin-top: 10px; }
.figp-dot { width: 6px; height: 6px; border-radius: 50%; background: #15803d; flex-shrink: 0; }
.figp-txt { font: 700 11px/1 var(--font-bold); color: #15803d; }

/* ─── Ready-to-use ───────────────────────────────────────────── */
.ready { padding: 72px 40px 80px; background: var(--page); }
.ready-inner { max-width: 1160px; margin: 0 auto; }
.ready-head { text-align: center; margin-bottom: 44px; }
.section-tag {
  font: 700 11px/1 var(--font-bold); letter-spacing: 1.2px;
  color: #9aa0ac; text-transform: uppercase; margin-bottom: 16px; display: block;
}
.section-h { font: 900 42px/1.1 var(--font-bold); color: #0a0a14; letter-spacing: -1.5px; margin-bottom: 14px; }
.section-sub { font: 15px/1.6 var(--font-normal); color: #6b7280; max-width: 440px; margin: 0 auto; }

/* collage */
.collage { display: flex; flex-direction: column; gap: 20px; }
.collage-top {
  display: grid; grid-template-columns: 0.78fr 1fr 1.3fr; gap: 20px; align-items: stretch;
}
.collage-bottom {
  display: grid; grid-template-columns: 1fr 1.1fr; gap: 20px; align-items: stretch;
}
.cc {
  background: #fff; border: 1px solid rgba(10,10,20,0.08);
  border-radius: 14px; padding: 18px; overflow: hidden;
  box-shadow: 0 2px 14px rgba(10,10,20,0.04);
}

/* token-list mini panel */
.tok-panel { display: flex; flex-direction: column; gap: 2px; position: relative; }
.tok-tabbar { display: flex; gap: 4px; margin-bottom: 8px; }
.tok-tab { padding: 3px 8px; border-radius: 4px; font: 700 9px/1 var(--font-bold); }
.tok-tab.on { background: #FF3D9A; color: #fff; }
.tok-tab.off { background: #f1f2f4; color: #9aa0ac; }
.tok-item { display: flex; align-items: center; justify-content: space-between; padding: 5px 6px; border-radius: 4px; font: 11px/1 var(--font-normal); color: #4b5563; }
.tok-item:hover { background: #f7f8fa; }
.tok-item .v { font: 10px/1 var(--font-mono); color: #9aa0ac; }
.tok-item.head { font-family: var(--font-bold); color: #0a0a14; font-weight: 700; }

/* palette card */
.pal-block { margin-bottom: 14px; }
.pal-block:last-child { margin-bottom: 0; }
.pal-name { font: 700 11px/1 var(--font-bold); color: #374151; margin-bottom: 7px; }
.pal-row { display: flex; gap: 3px; }
.pal-sw { flex: 1; height: 26px; border-radius: 4px; }
.pal-step { flex: 1; text-align: center; font: 7px/1 var(--font-mono); color: #b5bac3; margin-top: 3px; }

/* button-variants grid */
.bvg-head { display: flex; gap: 6px; margin-bottom: 12px; }
.bvg-col-label { flex: 1; text-align: center; font: 700 8px/1 var(--font-bold); color: #9aa0ac; }
.bvg-row { display: flex; gap: 6px; margin-bottom: 8px; }
.bvg-cell { flex: 1; display: flex; justify-content: center; }

/* weather widget */
.weather { padding: 0; position: relative; min-height: 200px; display: flex; flex-direction: column; justify-content: space-between; color: #fff;
  background: linear-gradient(135deg, #7ba7d4 0%, #9cb8d8 45%, #c8d4e0 100%); }
.weather-top { display: flex; align-items: center; gap: 6px; padding: 16px 18px 0; font: 700 12px/1 var(--font-bold); }
.weather-main { padding: 0 18px; }
.weather-temp { font: 900 44px/1 var(--font-bold); letter-spacing: -2px; }
.weather-date { font: 11px/1 var(--font-normal); opacity: .85; margin-top: 4px; }
.weather-cloud { position: absolute; right: 18px; top: 34px; opacity: .92; }
.weather-foot { background: linear-gradient(90deg, #f5a623, #f7b733); padding: 11px 18px; display: flex; align-items: center; justify-content: space-between; font: 700 11px/1 var(--font-bold); }

/* annotated input card */
.ainput { position: relative; display: flex; align-items: center; justify-content: center; min-height: 200px; }
.ainput-field { width: 230px; }
.ainput-label { font: 700 11px/1 var(--font-bold); color: #374151; margin-bottom: 7px; }
.ainput-box { height: 38px; border: 1.5px solid var(--blue); border-radius: 6px; background: #fff; display: flex; align-items: center; padding: 0 12px; font: 12px/1 var(--font-normal); color: #9aa0ac; }
.ainput-hint { font: 10px/1 var(--font-normal); color: #b5bac3; margin-top: 6px; }
.stag { position: absolute; padding: 2px 6px; border-radius: 3px; font: 700 8px/1.4 var(--font-bold); color: #fff; white-space: nowrap; z-index: 2; }
.stag.pad { background: #FF3D9A; }
.stag.sp  { background: #8b5cf6; }
.stag.spx { background: #06b6d4; }

/* trusted-by */
.trusted {
  display: flex; align-items: center; justify-content: center; gap: 14px;
  margin: 40px auto 0; padding: 11px 18px;
  background: #fff; border: 1px solid rgba(10,10,20,0.08); border-radius: 12px;
  width: fit-content; box-shadow: 0 2px 12px rgba(10,10,20,0.04);
}
.trusted-avatars { display: flex; }
.trusted-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  border: 2px solid #fff;
  margin-left: -8px; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font: 700 10px/1 var(--font-bold);
}
.trusted-avatar:first-child { margin-left: 0; }
.trusted-divider { width: 1px; height: 28px; background: rgba(10,10,20,0.1); }
.trusted-text { font: 13px/1.4 var(--font-normal); color: #6b7280; }
.trusted-text strong { font-family: var(--font-bold); color: #0a0a14; }

/* ─── CTA: Start building today ──────────────────────────────── */
.build {
  padding: 80px 40px 88px;
  position: relative; overflow: hidden;
  background:
    radial-gradient(ellipse 70% 90% at 50% 120%, rgba(120,160,230,0.55) 0%, transparent 60%),
    radial-gradient(ellipse 60% 70% at 15% 10%, rgba(150,180,235,0.4) 0%, transparent 55%),
    radial-gradient(ellipse 60% 70% at 85% 10%, rgba(150,180,235,0.4) 0%, transparent 55%),

.build-inner { max-width: 1100px; margin: 0 auto; position: relative; }

  display: flex; align-items: center; justify-content: center; gap: 14px; flex-wrap: wrap;
}
/* animated word slot-machine: building → designing → shipping,
   with the pill colour changing to match each word (Figma 5252:45684) */
.word-pill {
  display: inline-block; position: relative;
  width: 221px; height: 60px; border: 1px solid #fff; border-radius: 5px;
  overflow: hidden; vertical-align: middle;
  animation: wordbg 6s infinite;
}
.word-track {
  position: absolute; left: 0; right: 0; top: 0;
  display: flex; flex-direction: column;
  animation: wordslide 6s infinite;
}
.word-track span {
  height: 60px; line-height: 60px; text-align: center;
  font: 400 44px/60px var(--font-bold); color: #fdf5f0; letter-spacing: -1px;
}
@keyframes wordslide {
  0%,    20%   { transform: translateY(0); }
  26.7%, 46.7% { transform: translateY(-60px); }
  53.3%, 73.3% { transform: translateY(-120px); }
  80%,   100%  { transform: translateY(-180px); }
}
@keyframes wordbg {
  0%,    23%   { background: #f68136; }   /* building — orange */
  26.7%, 50%   { background: #5636f6; }   /* designing — purple */
  53.3%, 76%   { background: #ff0083; }   /* shipping — pink */
  80%,   100%  { background: #f68136; }   /* building — orange (loop) */
}
@media (prefers-reduced-motion: reduce) {
  .word-track { animation: none; }
  .word-pill { animation: none; background: #f68136; }
}
.build-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; margin-bottom: 44px; }
.bstep { display: flex; gap: 16px; align-items: flex-start; }
.bstep-num {

.bstep-h { font: 700 18px/1 var(--font-bold); color: #0a0a14; margin-bottom: 8px; }
.bstep-p { font: 13.5px/1.6 var(--font-normal); color: #5c616e; }
.build-actions { display: flex; gap: 12px; justify-content: center; }
.build-btn-ghost {
